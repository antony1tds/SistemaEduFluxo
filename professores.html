<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professores</title>
</head>
<body>
    <div class="box">
        <p>Usuário:</p>
        <input  class="inputs"  type="text" placeholder="Digite Seu Usuário" id="usuario" >
        <p>Senha:</p>
        <input class="inputs" type="password" placeholder="Digite Sua Senha" id="senha" > 
        <button class="Entrar">Entrar</button>
        <button class="cadastro">Cadastrar</button>
     </div>

     <div class="caixa">
        <p>Usuário:</p>
        <input  class="inputs"   type="text" placeholder="Digite Seu Usuário" id="usuario">
        <p>Senha:</p>
        <input class="inputs" type="password" placeholder="Digite Sua Senha" id="senha"> 
        <button class="cadastro1">Cadastrar</button>
     </div>

     <div class="ocorrencia">
        <H1> Descreva a sua ocorrência</H1>
        <p>Nome do Aluno</p>
        <input placeholder="Digite o Nome do Aluno" type="text" class="aluno">
        <p>Turma do Aluno</p>
        <input placeholder="Digite a Turma do aluno" type="text" class="turma">
        <br><br>
        <input type="text" placeholder="digite o que aconteceu" class="texto" >
        <br><br>        
        <button class="validar">enviar</button>
     </div>
  
 
     <style>
         html, body{
             padding: 0;
             margin: 0;
             min-height: 100vh;
         }
         body {
             display: flex;
             justify-content: center;
             align-items: center;
             background: linear-gradient(to right, black 30%, blue 70%);
         }
         .box {
             height: 67vh;
             width: 50vw;
             border: none;
             gap: 1vh;
             border-radius: 20px;
             color: aliceblue;
             font-size: 4.9vh;
             display: none;
             flex-direction: column;
             align-items: center;
             justify-content: center; 
             background-color: rgba(0, 0, 143, 0.8);
         }  

         .inputs{
            border: none;
            border-radius: 1vh;
            font-size: 2.2vh;
         }

         .Entrar {
             padding: 2vh;
             padding-left: 5vh;
             padding-right: 5vh;
             border-radius: 50vh;
             margin: 6vh;
             cursor: pointer;
         }

         .cadastro, .cadastro1{
            padding: 2vh;
             padding-left: 5vh;
             padding-right: 5vh;
             border-radius: 50vh;
             margin: 1vh;
             cursor: pointer;
         }

         .caixa{
            
             height: 67vh;
             width: 50vw;
             border: none;
             gap: 1vh;
             border-radius: 20px;
             color: aliceblue;
             font-size: 4.9vh;
             display: none;
             flex-direction: column;
             align-items: center;
             justify-content: center; 
             background-color: rgba(0, 0, 143, 0.8);
         }

         .ocorrencia{
            background-color: darkblue;
            height: 67vh;
            width: 50vw;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            display: flex;
            border: none;
            border-radius: 2vh;
            color: white   ;
            

         }

         .aluno{
            display: block;
            width: 20vw;
            border-radius: 2vh;
            font-size: small;
            padding: 0.75vh;
         }

         .turma{
            display: block;
            width: 20vw;
            border-radius: 2vh;
            font-size: small;
            padding: 0.75vh;

         }

         .validar{
            border-radius: 2.5vh;
            border: none;
            width: 10vw;
            padding: 0.75vh;
            cursor: pointer;
            margin-bottom: 1hv;
            
         }

         .texto{
            width: 40vw;
            height: 50vh;
            border-radius: 2.5vh;
            font-size: medium;
            
            
            
         }
         .texto ::placeholder{
           
           display: flex;
           
         }
         
     </style>
     <script>
        
        let cadastro = document.querySelector(".caixa");
        let login = document.querySelector(".box")
        let btncadastro1 = document.querySelector(".cadastro1")
        let btncadastro = document.querySelector(".cadastro")
        let btnEntrar = document.querySelector(".Entrar");
        btnEntrar.addEventListener("click", () => {
            login.style.display = "none";
                         
         })

         btncadastro.addEventListener("click", () =>{
            login.style.display = "none";
            cadastro.style.display = "flex"
         })

         btncadastro1.addEventListener("click", () =>{
           const input = document.getElementById("usuario","senha").value.trim();

           if(!input){
               alert("digite o usuario ou senha");
               return
            }
            else{
                alert("salvo com success")
            }
         })






     </script>
</body>
</html>
